services:
  postgres:
    image: postgres:16
    container_name: booking-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_pass
      POSTGRES_DB: booking_db
    ports:
      - "5432:5432"
    volumes:
      - booking_pgdata:/var/lib/postgresql/data

volumes:
  booking_pgdata: